<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SereneMind</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            green: '#638c75',
                            light: '#e6f0eb',
                            bg: '#f4f7f6'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-bg min-h-screen flex items-center justify-center p-4">

    <!-- Login Card -->
    <div class="bg-white p-8 md:p-12 rounded-3xl card-shadow w-full max-w-md border border-gray-100 shadow-xl">
        
        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">
                Serene<span class="text-brand-green">Mind</span>
            </h1>
            <p class="text-gray-500 text-sm">Welcome back, please login to your account</p>
        </div>

        <!-- Form -->
        <form action="index.html" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-4 top-3.5 text-gray-400"></i>
                    <input type="email" placeholder="abisha@example.com" class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-brand-green transition-colors">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-3.5 text-gray-400"></i>
                    <input type="password" placeholder="••••••••" class="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-brand-green transition-colors">
                </div>
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2 text-gray-600">
                    <input type="checkbox" class="accent-brand-green"> Remember me
                </label>
                <a href="#" class="text-brand-green font-medium hover:underline">Forgot password?</a>
            </div>

            <button type="submit" class="w-full bg-brand-green text-white py-3.5 rounded-xl font-semibold hover:bg-opacity-90 transition-all shadow-lg shadow-brand-green/20">
                Sign In
            </button>
        </form>

        <!-- Footer -->
        <p class="text-center text-gray-500 text-sm mt-8">
            Don't have an account? <a href="#" class="text-brand-green font-bold hover:underline">Sign up</a>
        </p>
    </div>

    <!-- Background Decorative Elements (Consistent with Dashboard) -->
    <div class="fixed inset-0 z-[-1] pointer-events-none overflow-hidden">
        <div class="absolute bottom-0 left-0 w-[300px] h-[300px] bg-brand-green opacity-5 rounded-full blur-[100px]"></div>
        <div class="absolute top-0 right-0 w-[400px] h-[400px] bg-brand-light opacity-50 rounded-full blur-[100px]"></div>
    </div>

</body>
</html>
