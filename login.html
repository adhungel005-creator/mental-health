<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SereneMind Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-50 flex items-center justify-center min-h-screen p-4 relative overflow-hidden">

    <img src="/pot.png" alt="Plant" class="absolute bottom-0 left-0 w-64 opacity-80">
    <img src="/plants.png" alt="Leaves" class="absolute top-0 right-0 w-80 opacity-60">

    <div class="bg-white rounded-3xl shadow-2xl flex flex-col md:flex-row w-full max-w-4xl overflow-hidden z-10">
        
        <div class="bg-emerald-50/50 p-12 flex flex-col items-center justify-center text-center md:w-1/2">
            <img src="/logo.png" alt="SereneMind Logo" class="w-32 mb-6">
            <h1 class="text-3xl font-bold text-emerald-900 mb-2">SereneMind</h1>
            <p class="text-emerald-700 mb-8">Intelligent Mental Health Monitoring System</p>
            
            <img src="/meditation.png" alt="Meditation" class="w-64 mb-8">
            
            <div class="bg-emerald-100 px-4 py-2 rounded-full text-emerald-800 font-medium">
                Your mental well-being is our priority.
            </div>
        </div>

        <div class="p-12 md:w-1/2 flex flex-col justify-center">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Welcome Back</h2>
            <p class="text-gray-500 mb-8">Login to continue your journey towards better mental well-being.</p>

            <form class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email Address</label>
                    <input type="email" placeholder="Enter your email" class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" placeholder="Enter your password" class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <button class="w-full bg-emerald-700 text-white py-3 rounded-lg font-semibold hover:bg-emerald-800 transition">
                    Login
                </button>
            </form>
        </div>
    </div>

</body>
<script>
    const loginForm = document.querySelector('form');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault(); // Stop page refresh

        const email = e.target[0].value;
        const password = e.target[1].value;

        try {
            const response = await fetch('https://your-backend-api.com/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();
            
            if (response.ok) {
                alert('Login successful!');
            } else {
                alert('Login failed: ' + data.message);
            }
        } catch (error) {
            console.error('Error connecting to backend:', error);
            alert('Could not connect to the server.');
        }
    });
</script>
</html>
